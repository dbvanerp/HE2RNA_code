[main]
path: /home/dvanerp/pepsi/results/he2rna_mixed_cscc_tcga_anchor_nested/
data_mode: mixed_cscc_tcga_anchor
use_saved_model: /home/dvanerp/pepsi/results/training_runs/FEB16_model2_newsupertiles_providedsplits_TCGA_UNI_newgenelist
p_value: t_test

[data]
# CSCC target domain
path_to_transcriptome: /gpfs/work4/0/prjs1086/derm_shared/cscc/processed/rna_counts/txi.gene.counts.csv
path_to_data: /gpfs/work4/0/prjs1086/derm_shared/cscc/processed/he_packed_patch_feat_uni/rsm2/h5_files
keyfile_path: /gpfs/work4/0/prjs1086/derm_shared/cscc/doc/keyfiles/20260204_project_keyfile_anonymized_rsm2_with_qc.csv,/gpfs/work4/0/prjs1086/derm_shared/cscc/processed/cd/DSQUAME_development_NCC_dataset_clean_no_newlines.csv
project_column: study4

# Shared genes used for both domains
genes: /home/dvanerp/pepsi/data/processed/cscc_rna/filtered_genes_tcgaANDcscc_csccmedian_pc_nc.csv

# TCGA replay buffer / anchor domain
tcga_path_to_data: /home/dvanerp/pepsi/data/processed/UNI2-TCGA-data/TCGA_subsampled_8000
tcga_path_to_transcriptome: /home/dvanerp/pepsi/data/raw/tcga_rna/tcga_all_transcriptomes_tpm_10782.csv
tcga_keyfile_path: /home/dvanerp/pepsi/data/raw/manifests/new_keyfiles/new_master_keyfile.csv
tcga_project_filter: TCGA-HNSC,TCGA-LUSC,TCGA-CESC,TCGA-ESCA,TCGA-BLCA

[architecture]
layers: 1024,1024
ks: 10,20,50,100,200,500,1000,2000,5000
dropout: 0.25
nonlin: relu
device: cuda

[training]
max_epochs: 150
patience: 30
batch_size: 4
num_workers: 8
allow_mixed_multiworker: true

# Set to true for strict nested CV
; nested_cv: true
; inner_folds: 3

[optimization]
optimizer: adam
lr: 3e-4
; differential_lr: true
; head_lr_multiplier: 5.0
; nested_lr_candidates: 1e-4,3e-4,1e-3
